<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <link rel="stylesheet" href="./todoList.css">
</head>
<body>
    <h1 class="title">TO-DO LIST</h1>
    <hr style="border: 2px solid rgb(255, 141, 186); width: 80%; margin: 0 auto; margin-top: 100px;">
    <input type="text" placeholder="할 일을 입력해라 멍청한 고구마야" size="50" id="input">
    <section class="todo-input">
        해야 할 일
        <ul id="todo-list">
        </ul>
    </section>


    <section class="done-input">
        해낸 일
        <ul id="done-list">            
        </ul>
    </section>
    
    <script src="./todoList.js"></script>

</body>
</html>
